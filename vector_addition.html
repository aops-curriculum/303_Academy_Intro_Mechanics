<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1">
  <meta name="eigennode-aspect" content="4/3">
  <title>Vector Addition</title>
  <!-- Original AoPS interactive. Replaces the third-party "Vector Addition" simulation. -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      position: relative;
      background: #f4f6fa;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none; -webkit-user-select: none;
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }
  </style>
</head>
<body>
  <canvas id="c" width="800" height="600"></canvas>
  <script>
  (() => {
    'use strict';
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 800, H = 600;
    // Crisp adaptive sizing: backing store = displayed size * dpr (capped at 2),
    // logical W x H mapped onto it via setTransform. fit() re-runs on resize; the
    // rAF loop repaints every frame, so fit() does not draw itself.
    function fit() {
      const DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const cw = canvas.clientWidth, ch = canvas.clientHeight;
      if (!cw || !ch) return;
      canvas.width = Math.round(cw * DPR);
      canvas.height = Math.round(ch * DPR);
      ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
    }

    // ── Layout ───────────────────────────────────────────────
    const BAR = { x: 16, y: 8,  w: 576, h: 42 };   // readout bar
    const GP  = { x: 16, y: 58, w: 576, h: 480 };  // grid panel
    const CELL = 12, GX = 24, GY = 20;             // px/unit, half-extents
    const OX = GP.x + GP.w / 2, OY = GP.y + GP.h / 2;
    const PX = 604, PW = 188;                      // right control column
    const trayBox = { x: PX, y: 388, w: PW, h: 146 };

    // ── Colors ───────────────────────────────────────────────
    const COL = {
      bg: '#f4f6fa', panel: '#ffffff', border: '#d6deea',
      gridMinor: '#e9eef6', gridMajor: '#ccd8e6', axis: '#3a4554',
      text: '#2b3645', muted: '#8d9bac', accent: '#3565c0',
      sum: '#e8650d'
    };
    const VDEF = [
      { id: 'a', color: '#1d4ed8', def: { x: 4, y: 3 } },   // royal blue
      { id: 'b', color: '#0ea5e9', def: { x: 3, y: 4 } },   // sky blue
      { id: 'c', color: '#5b6abf', def: { x: 4, y: -3 } }   // slate blue
    ];

    // ── State ────────────────────────────────────────────────
    const S = {};   // settings: sum, values, angles, grid, comps, deg360, polar
    const vectors = VDEF.map(d => ({
      id: d.id, color: d.color, def: { ...d.def },
      tail: { x: 0, y: 0 }, c: { ...d.def }, placed: false
    }));
    let selected = null;        // 'a' | 'b' | 'c' | 's' | null
    let drag = null;            // { kind:'tip'|'move'|'new', v, off }
    let anim = null;            // tip-to-tail animation
    let mouse = { x: -99, y: -99 };
    let hoverW = null;

    // ── Math helpers ─────────────────────────────────────────
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
    const R2D = 180 / Math.PI, D2R = Math.PI / 180;
    const sx = wx => OX + wx * CELL;
    const sy = wy => OY - wy * CELL;
    const toWorld = p => ({ x: (p.x - OX) / CELL, y: (OY - p.y) / CELL });
    const inRect = (p, r) => p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h;
    const magOf = v => Math.hypot(v.c.x, v.c.y);

    function angleDeg(cx, cy) {          // convention-adjusted angle in degrees
      let a = Math.atan2(cy, cx) * R2D;  // (-180, 180]
      if (S.deg360 && a < 0) a += 360;   // [0, 360)
      return a;
    }
    function fmt1(v) {                   // fixed 1-decimal, no "-0.0"
      let r = Math.round(v * 10) / 10;
      if (Object.is(r, -0)) r = 0;
      return r.toFixed(1);
    }
    function fmtS(v) {                   // short: integers without ".0"
      let r = Math.round(v * 10) / 10;
      if (Object.is(r, -0)) r = 0;
      return Number.isInteger(r) ? String(r) : r.toFixed(1);
    }

    // Integer-snapped tail keeping tail AND tip inside the grid
    function clampTail(t, c) {
      const lox = Math.ceil(-GX - Math.min(0, c.x) - 1e-9);
      const hix = Math.floor(GX - Math.max(0, c.x) + 1e-9);
      const loy = Math.ceil(-GY - Math.min(0, c.y) - 1e-9);
      const hiy = Math.floor(GY - Math.max(0, c.y) + 1e-9);
      return { x: clamp(Math.round(t.x), lox, hix), y: clamp(Math.round(t.y), loy, hiy) };
    }
    // Float version (used by URL-param tails and tip-to-tail chains)
    function clampTailF(t, c) {
      return {
        x: clamp(t.x, -GX - Math.min(0, c.x), GX - Math.max(0, c.x)),
        y: clamp(t.y, -GY - Math.min(0, c.y), GY - Math.max(0, c.y))
      };
    }

    function snapTip(v, w) {
      if (S.polar) {
        const dx = w.x - v.tail.x, dy = w.y - v.tail.y;
        const r = Math.hypot(dx, dy);
        if (r < 0.3) return;
        let rs = Math.max(0.5, Math.round(r * 2) / 2);          // |v| snaps to 0.5
        const as = Math.round(Math.atan2(dy, dx) * R2D / 5) * 5 * D2R; // θ snaps to 5°
        const mk = () => ({ x: rs * Math.cos(as), y: rs * Math.sin(as) });
        let c = mk();
        while (rs > 0.5 && (Math.abs(v.tail.x + c.x) > GX || Math.abs(v.tail.y + c.y) > GY)) {
          rs -= 0.5; c = mk();
        }
        if (Math.abs(v.tail.x + c.x) > GX + 1e-9 || Math.abs(v.tail.y + c.y) > GY + 1e-9) return;
        v.c = { x: Math.round(c.x * 1e6) / 1e6, y: Math.round(c.y * 1e6) / 1e6 };
      } else {
        const tx = clamp(Math.round(w.x), -GX, GX);             // integer components
        const ty = clamp(Math.round(w.y), -GY, GY);
        const c = { x: tx - v.tail.x, y: ty - v.tail.y };
        if (c.x === 0 && c.y === 0) return;                     // never zero-length
        v.c = c;
      }
    }

    function placedVecs() { return vectors.filter(v => v.placed); }
    function sumC() {
      const s = { x: 0, y: 0 };
      for (const v of placedVecs()) { s.x += v.c.x; s.y += v.c.y; }
      return s;
    }
    function sumVisible() { return S.sum && placedVecs().length > 0; }

    // ── Tip-to-tail arrangement ──────────────────────────────
    function arrangeTipToTail() {
      const order = placedVecs();
      if (order.length < 2 || anim) return;
      let cur = { ...order[0].tail };
      const targets = [];
      let minX = cur.x, maxX = cur.x, minY = cur.y, maxY = cur.y;
      for (const v of order) {
        targets.push({ v, to: { x: cur.x, y: cur.y } });
        cur = { x: cur.x + v.c.x, y: cur.y + v.c.y };
        minX = Math.min(minX, cur.x); maxX = Math.max(maxX, cur.x);
        minY = Math.min(minY, cur.y); maxY = Math.max(maxY, cur.y);
      }
      let dx = 0, dy = 0;                       // shift chain into bounds if needed
      if (minX < -GX) dx = -GX - minX;
      if (maxX + dx > GX) dx = GX - maxX;
      if (minY < -GY) dy = -GY - minY;
      if (maxY + dy > GY) dy = GY - maxY;
      const items = targets.map(t => ({
        v: t.v, from: { ...t.v.tail },
        to: clampTailF({ x: t.to.x + dx, y: t.to.y + dy }, t.v.c)
      }));
      anim = { t: 0, dur: 0.7, items };
    }
    function finishAnim() {
      if (!anim) return;
      for (const it of anim.items) it.v.tail = { ...it.to };
      anim = null;
    }

    function eraseAll() {
      finishAnim();
      for (const v of vectors) v.placed = false;
      selected = null; drag = null;
    }

    // ── URL params / init ────────────────────────────────────
    function parseVecStr(s, allowZero) {
      if (!s) return null;
      s = s.trim();
      if (s.includes('@')) {                    // polar form "r@deg"
        const parts = s.split('@');
        const r = parseFloat(parts[0]), a = parseFloat(parts[1]);
        if (!isFinite(r) || !isFinite(a) || r <= 0) return null;
        return { x: r * Math.cos(a * D2R), y: r * Math.sin(a * D2R) };
      }
      const m = s.split(',');
      if (m.length !== 2) return null;
      const x = parseFloat(m[0]), y = parseFloat(m[1]);
      if (!isFinite(x) || !isFinite(y)) return null;
      if (!allowZero && x === 0 && y === 0) return null;
      return { x, y };
    }

    function init() {
      Object.assign(S, {
        sum: false, values: true, angles: false, grid: true,
        comps: 'axes', deg360: false, polar: false
      });
      selected = null; drag = null; anim = null;
      const q = new URLSearchParams(location.search);
      const flag = (k, dflt) => {
        const v = q.get(k);
        return v === null ? dflt : (v !== '0' && v !== 'false' && v !== 'off');
      };
      S.sum    = flag('sum', false);
      S.values = flag('values', true);
      S.angles = flag('angle', flag('angles', false));
      S.grid   = flag('grid', true);
      const cm = (q.get('components') || 'axes').toLowerCase();
      S.comps = /^(none|off|0)$/.test(cm) ? 'none' : /^tri/.test(cm) ? 'triangle' : 'axes';
      S.deg360 = q.get('deg') === '360';
      S.polar  = (q.get('snap') || '').toLowerCase() === 'polar';
      for (const v of vectors) {
        v.placed = false; v.c = { ...v.def }; v.tail = { x: 0, y: 0 };
        const pc = parseVecStr(q.get(v.id), false);
        if (pc) {
          v.c = { x: clamp(pc.x, -2 * GX, 2 * GX), y: clamp(pc.y, -2 * GY, 2 * GY) };
          const pt = parseVecStr(q.get(v.id + 'tail'), true) || { x: 0, y: 0 };
          v.tail = clampTailF(pt, v.c);
          v.placed = true;
        }
      }
      const sel = q.get('select');
      if (sel === 's') { if (sumVisible()) selected = 's'; }
      else if (sel && vectors.some(v => v.id === sel && v.placed)) selected = sel;
    }

    // ── Drawing primitives ───────────────────────────────────
    function rr(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }
    function panelBox(x, y, w, h) {
      rr(x, y, w, h, 8);
      ctx.fillStyle = COL.panel; ctx.fill();
      ctx.strokeStyle = COL.border; ctx.lineWidth = 1; ctx.stroke();
    }
    function arrow(x1, y1, x2, y2, o) {
      const dx = x2 - x1, dy = y2 - y1, L = Math.hypot(dx, dy);
      if (L < 1) return;
      const ux = dx / L, uy = dy / L;
      const hl = Math.min(o.headL || 12, L * 0.55), hw = o.headW || 8.5;
      ctx.save();
      if (o.alpha !== undefined) ctx.globalAlpha = o.alpha;
      ctx.strokeStyle = o.color; ctx.fillStyle = o.color;
      ctx.lineWidth = o.lw || 4; ctx.lineCap = 'round';
      if (o.dash) ctx.setLineDash(o.dash);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2 - ux * hl * 0.85, y2 - uy * hl * 0.85);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - ux * hl - uy * hw / 2, y2 - uy * hl + ux * hw / 2);
      ctx.lineTo(x2 - ux * hl + uy * hw / 2, y2 - uy * hl - ux * hw / 2);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
    // Italic letter with a small vector arrow drawn above; returns width used
    function vecLetter(letter, x, y, size, color) {
      ctx.fillStyle = color; ctx.strokeStyle = color;
      ctx.font = 'italic ' + size + 'px Georgia, serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
      const w = ctx.measureText(letter).width;
      ctx.fillText(letter, x, y);
      const ay = y - size * 0.88;
      ctx.lineWidth = 1.1;
      ctx.beginPath(); ctx.moveTo(x + 0.5, ay); ctx.lineTo(x + w + 1.5, ay); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + w + 4, ay);
      ctx.lineTo(x + w, ay - 2.5);
      ctx.lineTo(x + w, ay + 2.5);
      ctx.closePath(); ctx.fill();
      return w + 4;
    }

    // ── Grid ─────────────────────────────────────────────────
    function drawGridLines() {
      if (S.grid) {
        ctx.lineWidth = 1;
        for (let i = -GX; i <= GX; i++) {
          ctx.strokeStyle = (i % 5 === 0) ? COL.gridMajor : COL.gridMinor;
          ctx.beginPath(); ctx.moveTo(sx(i), GP.y); ctx.lineTo(sx(i), GP.y + GP.h); ctx.stroke();
        }
        for (let j = -GY; j <= GY; j++) {
          ctx.strokeStyle = (j % 5 === 0) ? COL.gridMajor : COL.gridMinor;
          ctx.beginPath(); ctx.moveTo(GP.x, sy(j)); ctx.lineTo(GP.x + GP.w, sy(j)); ctx.stroke();
        }
      }
      // Axes (always shown)
      ctx.strokeStyle = COL.axis; ctx.lineWidth = 1.6; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(GP.x + 3, OY); ctx.lineTo(GP.x + GP.w - 10, OY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(OX, GP.y + GP.h - 3); ctx.lineTo(OX, GP.y + 10); ctx.stroke();
      ctx.fillStyle = COL.axis;
      ctx.beginPath();
      ctx.moveTo(GP.x + GP.w - 3, OY); ctx.lineTo(GP.x + GP.w - 11, OY - 4.5);
      ctx.lineTo(GP.x + GP.w - 11, OY + 4.5); ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(OX, GP.y + 3); ctx.lineTo(OX - 4.5, GP.y + 11);
      ctx.lineTo(OX + 4.5, GP.y + 11); ctx.closePath(); ctx.fill();
      ctx.font = 'italic 13px Georgia, serif';
      ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'left';
      ctx.fillText('x', GP.x + GP.w - 14, OY - 8);
      ctx.fillText('y', OX + 9, GP.y + 16);
      // Ticks + numbers every 5 units
      ctx.font = '10px Segoe UI, system-ui, sans-serif';
      for (let i = -20; i <= 20; i += 5) {
        if (i === 0) continue;
        ctx.strokeStyle = COL.axis; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.moveTo(sx(i), OY - 4); ctx.lineTo(sx(i), OY + 4); ctx.stroke();
        ctx.fillStyle = COL.muted; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText(String(i), sx(i), OY + 7);
      }
      for (let j = -20; j <= 20; j += 5) {
        if (j === 0 || Math.abs(j) === 20) continue;
        ctx.strokeStyle = COL.axis; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.moveTo(OX - 4, sy(j)); ctx.lineTo(OX + 4, sy(j)); ctx.stroke();
        ctx.fillStyle = COL.muted; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
        ctx.fillText(String(j), OX - 8, sy(j));
      }
      ctx.beginPath(); ctx.arc(OX, OY, 3, 0, 2 * Math.PI);
      ctx.fillStyle = '#94a3b3'; ctx.fill();
    }

    // ── Vector rendering ─────────────────────────────────────
    function drawComponents(v, color) {
      const t = v.tail, c = v.c;
      const x1 = sx(t.x), y1 = sy(t.y), x2 = sx(t.x + c.x), y2 = sy(t.y + c.y);
      const dash = [7, 5], lw = 3, al = 0.7;
      if (S.comps === 'triangle') {
        // dashed legs at the vector itself (x leg first, then y leg)
        if (Math.abs(c.x) > 0.01) arrow(x1, y1, x2, y1, { color, lw, dash, alpha: al, headL: 10, headW: 8 });
        if (Math.abs(c.y) > 0.01) arrow(x2, y1, x2, y2, { color, lw, dash, alpha: al, headL: 10, headW: 8 });
      } else if (S.comps === 'axes') {
        // dashed projections drawn on the x and y axes
        if (Math.abs(c.x) > 0.01) arrow(sx(t.x), sy(0), sx(t.x + c.x), sy(0), { color, lw, dash, alpha: al, headL: 10, headW: 8 });
        if (Math.abs(c.y) > 0.01) arrow(sx(0), sy(t.y), sx(0), sy(t.y + c.y), { color, lw, dash, alpha: al, headL: 10, headW: 8 });
        // faint guide lines from the tip to its two projections
        ctx.save();
        ctx.strokeStyle = color; ctx.globalAlpha = 0.3;
        ctx.lineWidth = 1; ctx.setLineDash([2, 4]);
        ctx.beginPath();
        ctx.moveTo(x2, y2); ctx.lineTo(x2, sy(0));
        ctx.moveTo(x2, y2); ctx.lineTo(sx(0), y2);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawAngle(v, color) {
      const c = v.c, L = Math.hypot(c.x, c.y);
      if (L < 1e-6) return;
      const th = angleDeg(c.x, c.y);
      if (Math.abs(th) < 0.05) return;
      const x0 = sx(v.tail.x), y0 = sy(v.tail.y);
      const rad = Math.min(26, L * CELL * 0.45);
      ctx.save();
      ctx.strokeStyle = '#9aa7b6'; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
      ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x0 + rad + 14, y0); ctx.stroke();
      ctx.setLineDash([]);
      ctx.strokeStyle = color; ctx.lineWidth = 1.8; ctx.globalAlpha = 0.9;
      ctx.beginPath(); ctx.arc(x0, y0, rad, 0, -th * D2R, th > 0); ctx.stroke();
      ctx.restore();
      if (S.values) {
        const mid = th / 2 * D2R;
        const lx = x0 + (rad + 14) * Math.cos(mid), ly = y0 - (rad + 14) * Math.sin(mid);
        ctx.fillStyle = COL.text; ctx.font = '11px Segoe UI, system-ui, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(fmtS(th) + '°', lx, ly);
      }
    }

    function tagSuffix(v) {
      if (!S.values) return null;
      if (S.polar) {
        const m = magOf(v), th = angleDeg(v.c.x, v.c.y);
        return fmt1(m) + ' ∠ ' + fmtS(th) + '°';
      }
      return '⟨' + fmtS(v.c.x) + ', ' + fmtS(v.c.y) + '⟩';
    }

    function drawTag(v) {
      const x1 = sx(v.tail.x), y1 = sy(v.tail.y);
      const x2 = sx(v.tail.x + v.c.x), y2 = sy(v.tail.y + v.c.y);
      const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
      let nx = -(y2 - y1), ny = x2 - x1;
      const nl = Math.hypot(nx, ny) || 1; nx /= nl; ny /= nl;
      if (ny > 0) { nx = -nx; ny = -ny; }       // prefer placing the tag above
      const suffix = tagSuffix(v);
      ctx.font = 'italic 13px Georgia, serif';
      const lw = ctx.measureText(v.id).width + 5;
      ctx.font = '12px Segoe UI, system-ui, sans-serif';
      const sw = suffix ? ctx.measureText(suffix).width + 5 : 0;
      const tw = lw + sw + 12, th = 20;
      let cx = clamp(mx + nx * 17, GP.x + tw / 2 + 2, GP.x + GP.w - tw / 2 - 2);
      let cy = clamp(my + ny * 17, GP.y + th / 2 + 2, GP.y + GP.h - th / 2 - 2);
      rr(cx - tw / 2, cy - th / 2, tw, th, 5);
      ctx.fillStyle = 'rgba(255,255,255,0.92)'; ctx.fill();
      ctx.strokeStyle = v.color; ctx.lineWidth = 1.2; ctx.stroke();
      let tx = cx - tw / 2 + 6;
      tx += vecLetter(v.id, tx, cy + 5, 13, v.color) + 4;
      if (suffix) {
        ctx.fillStyle = COL.text; ctx.font = '12px Segoe UI, system-ui, sans-serif';
        ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
        ctx.fillText(suffix, tx, cy + 4);
      }
    }

    function drawVector(v, isSel) {
      const x1 = sx(v.tail.x), y1 = sy(v.tail.y);
      const x2 = sx(v.tail.x + v.c.x), y2 = sy(v.tail.y + v.c.y);
      ctx.save();
      if (isSel) { ctx.shadowColor = v.color; ctx.shadowBlur = 9; }
      arrow(x1, y1, x2, y2, { color: v.color, lw: isSel ? 5 : 4, headL: 13, headW: 10 });
      ctx.restore();
      if (isSel && !v.isSum) {
        ctx.beginPath(); ctx.arc(x1, y1, 4, 0, 2 * Math.PI);
        ctx.fillStyle = v.color; ctx.fill();
        ctx.beginPath(); ctx.arc(x2, y2, 7.5, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.fill();
        ctx.strokeStyle = v.color; ctx.lineWidth = 2; ctx.stroke();
      }
      drawTag(v);
    }

    function drawZeroSum() {
      const x0 = sx(0), y0 = sy(0);
      ctx.save();
      if (selected === 's') { ctx.shadowColor = COL.sum; ctx.shadowBlur = 8; }
      ctx.beginPath(); ctx.arc(x0, y0, 8, 0, 2 * Math.PI);
      ctx.strokeStyle = COL.sum; ctx.lineWidth = 3; ctx.stroke();
      ctx.restore();
      const tw = 54, th = 20, cx = x0 + 44, cy = y0 - 20;
      rr(cx - tw / 2, cy - th / 2, tw, th, 5);
      ctx.fillStyle = 'rgba(255,255,255,0.92)'; ctx.fill();
      ctx.strokeStyle = COL.sum; ctx.lineWidth = 1.2; ctx.stroke();
      let tx = cx - tw / 2 + 8;
      tx += vecLetter('s', tx, cy + 5, 13, COL.sum) + 4;
      ctx.fillStyle = COL.text; ctx.font = '12px Segoe UI, system-ui, sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';

        "type": "toggle",
        "default": 1,
        "desc": "Show sum vector"
    },
    {
        "name": "values",
        "type": "toggle",
        "default": 1,
        "desc": "Show numeric values"
    },
    {
        "name": "angles",
        "type": "toggle",
        "default": 0,
        "desc": "Show angle arcs"
    },
    {
        "name": "a",
        "type": "text",
        "default": "",
        "desc": "Vector a: \"x,y\" or \"r@angle\" (e.g. 3,4 or 5@37)"
    },
    {
        "name": "b",
        "type": "text",
        "default": "",
        "desc": "Vector b: \"x,y\" or \"r@angle\""
    },
    {
        "name": "c",
        "type": "text",
        "default": "",
        "desc": "Vector c: \"x,y\" or \"r@angle\""
    },
    {
        "name": "select",
        "type": "select",
        "values": [
            "a",
            "b",
            "c",
            "s"
        ],
        "default": "",
        "desc": "Pre-select vector or sum"
    },
    {
        "name": "maxscale",
        "type": "number",
        "min": 0.5,
        "max": 5,
        "step": 0.1,
        "default": 2.4,
        "desc": "Max zoom factor for responsive scaling"
    },
    {
        "name": "maxw",
        "type": "number",
        "min": 200,
        "max": 2000,
        "step": 50,
        "default": "",
        "desc": "Max rendered width (px); 0 = uncapped"
    },
    {
        "name": "h",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": "",
        "desc": "Exact reported iframe height (px); overrides auto"
    },
    {
        "name": "maxh",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": 320,
        "desc": "Ceiling on auto-reported iframe height (px)"
    }
  {name:'zoom', type:'toggle', default:0, desc:'Enable zoom/pan controls'},
];

  var EMBED_KEYS = ['cheat'];

  // Build clean URL (no embed/cheat params) with optional overrides
  function buildCleanUrl(overrides) {
    var p = new URLSearchParams(location.search);
    EMBED_KEYS.forEach(function (k) { p.delete(k); });
    for (var k in overrides) {
      var v = overrides[k];
      if (v === null || v === '') p.delete(k);
      else p.set(k, v);
    }
    var qs = p.toString();
    return location.origin + location.pathname + (qs ? '?' + qs : '');
  }

  function buildCheatUrl(overrides) {
    var base = buildCleanUrl(overrides);
    return base + (base.indexOf('?') >= 0 ? '&' : '?') + 'cheat=1';
  }

  var urlLinkEl = null; // set after render

  function updateUrlDisplay(overrides) {
    if (!urlLinkEl) return;
    var u = buildCleanUrl(overrides || {});
    urlLinkEl.href = u;
    urlLinkEl.textContent = u;
  }

  // Resolve the effective current value of a param (may differ from raw URL string)
  function getEffective(def) {
    var raw = _cpQ.get(def.name);
    if (raw === null) return def['default'] !== undefined ? String(def['default']) : '';
    return raw;
  }

  function isTruthy(v) {
    return v !== '0' && v !== 'false' && v !== 'no' && v !== 'off' && v !== '';
  }

  function makeControl(def) {
    var effective = getEffective(def);

    if (def.type === 'toggle') {
      var on = isTruthy(effective);
      var btn = document.createElement('button');
      btn.textContent = on ? '1 (on)' : '0 (off)';
      btn.style.cssText = 'background:' + (on ? '#1b3d1b' : '#3d1b1b') + ';color:' +
        (on ? '#6dca80' : '#e07070') + ';border:1px solid ' +
        (on ? '#2a7a3a' : '#8a2a2a') + ';border-radius:3px;padding:3px 10px;' +
        'cursor:pointer;font-size:12px;font-family:inherit;min-width:70px';
      btn.addEventListener('click', function () {
        var updates = {};
        updates[def.name] = on ? '0' : '1';
        window.location.href = buildCheatUrl(updates);
      });
      return btn;
    }

    if (def.type === 'select') {
      var sel = document.createElement('select');
      sel.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
        'border-radius:3px;padding:3px 8px;font-size:12px;font-family:inherit;cursor:pointer';
      def.values.forEach(function (v) {
        var opt = document.createElement('option');
        opt.value = v; opt.textContent = v;
        if (effective === String(v)) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', function () {
        var updates = {}; updates[def.name] = sel.value;
        window.location.href = buildCheatUrl(updates);
      });
      return sel;
    }

    if (def.type === 'number') {
      var inp = document.createElement('input');
      inp.type = 'number';
      inp.value = effective;
      if (def.min !== undefined) inp.min = String(def.min);
      if (def.max !== undefined) inp.max = String(def.max);
      if (def.step !== undefined) inp.step = String(def.step);
      inp.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
        'border-radius:3px;padding:3px 6px;width:90px;font-size:12px;font-family:inherit';
      inp.addEventListener('change', function () {
        var updates = {}; updates[def.name] = inp.value;
        window.location.href = buildCheatUrl(updates);
      });
      return inp;
    }

    // text
    var inp2 = document.createElement('input');
    inp2.type = 'text';
    inp2.value = effective;
    inp2.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
      'border-radius:3px;padding:3px 6px;width:220px;font-size:12px;font-family:inherit';
    inp2.addEventListener('change', function () {
      var updates = {}; updates[def.name] = inp2.value;
      window.location.href = buildCheatUrl(updates);
    });
    return inp2;
  }

  function typeLabel(def) {
    if (def.type === 'toggle') return '0 | 1';
    if (def.type === 'select') return def.values.join(' | ');
    if (def.type === 'number') {
      var s = 'number';
      if (def.min !== undefined && def.max !== undefined) s = def.min + '–' + def.max;
      else if (def.min !== undefined) s = '≥' + def.min;
      else if (def.max !== undefined) s = '≤' + def.max;
      return s;
    }
    return 'text';
  }

  function render() {
    // Panel container (fixed at bottom)
    var panel = document.createElement('div');
    panel.id = 'cheat-panel';
    panel.style.cssText = [
      'position:fixed', 'bottom:0', 'left:0', 'right:0',
      'background:rgba(12,18,32,0.97)',
      'color:#c8d8e8',
      'font-family:"Segoe UI",system-ui,monospace',
      'font-size:13px',
      'border-top:2px solid #3a7bd5',
      'z-index:2147483647',
      'max-height:48vh',
      'overflow-y:auto',
      'padding:10px 16px 14px',
      'box-sizing:border-box',
      'box-shadow:0 -4px 24px rgba(0,0,0,0.6)'
    ].join(';');

    // Title bar
    var title = document.createElement('div');
    title.style.cssText = 'font-weight:bold;font-size:13px;color:#7ab8f5;margin-bottom:8px;' +
      'display:flex;align-items:center;justify-content:space-between';
    var titleText = document.createElement('span');
    titleText.textContent = '🔑 Cheat Panel — ' + location.pathname.split('/').pop();
    var closeBtn = document.createElement('button');
    closeBtn.textContent = '×';
    closeBtn.title = 'Close cheat panel (reload to restore)';
    closeBtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;' +
      'cursor:pointer;padding:0 4px;line-height:1';
    closeBtn.addEventListener('click', function () { panel.remove(); });
    title.appendChild(titleText);
    title.appendChild(closeBtn);
    panel.appendChild(title);

    // Table
    var table = document.createElement('table');
    table.style.cssText = 'border-collapse:collapse;width:100%;margin-bottom:10px';
    var thead = table.createTHead();
    var hrow = thead.insertRow();
    ['Parameter', 'Type / Values', 'Control', 'Description'].forEach(function (h) {
      var th = document.createElement('th');
      th.textContent = h;
      th.style.cssText = 'text-align:left;padding:4px 10px;border-bottom:1px solid #1e3050;' +
        'color:#5a8fc0;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;' +
        'white-space:nowrap';
      hrow.appendChild(th);
    });
    var tbody = table.createTBody();
    CHEAT_DEFS.forEach(function (def) {
      var row = tbody.insertRow();
      var isSet = _cpQ.has(def.name);
      row.style.cssText = 'border-bottom:1px solid #131f30;' +
        (isSet ? 'background:rgba(58,123,213,0.08)' : '');

      // Name cell
      var nc = row.insertCell();
      nc.style.cssText = 'padding:5px 10px;font-weight:bold;font-size:12px;' +
        'color:' + (isSet ? '#a8d4ff' : '#7fa8d0') + ';white-space:nowrap;font-family:monospace';
      nc.textContent = def.name;

      // Type cell
      var tc = row.insertCell();
      tc.style.cssText = 'padding:5px 10px;color:#5a7a90;font-size:11px;' +
        'max-width:200px;font-family:monospace';
      tc.textContent = typeLabel(def);

      // Control cell
      var cc = row.insertCell();
      cc.style.cssText = 'padding:4px 10px;white-space:nowrap';
      cc.appendChild(makeControl(def));

      // Desc cell
      var dc = row.insertCell();
      dc.style.cssText = 'padding:5px 10px;color:#8aa0b0;font-size:12px';
      dc.textContent = (def.desc || '') + (def['default'] !== undefined
        ? ' (default: ' + def['default'] + ')' : '');
    });
    panel.appendChild(table);

    // URL display
    var urlBox = document.createElement('div');
    urlBox.style.cssText = 'background:#080d1a;border:1px solid #1e3050;border-radius:4px;' +
      'padding:7px 12px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap';
    var urlLabel = document.createElement('span');
    urlLabel.style.cssText = 'color:#5a8fc0;font-size:11px;text-transform:uppercase;' +
      'letter-spacing:0.06em;white-space:nowrap;flex-shrink:0';
    urlLabel.textContent = 'URL:';
    urlLinkEl = document.createElement('a');
    urlLinkEl.style.cssText = 'color:#5fba7d;word-break:break-all;font-size:12px;' +
      'font-family:monospace;text-decoration:none';
    urlLinkEl.addEventListener('click', function (e) {
      e.preventDefault();
      window.location.href = buildCheatUrl({});
    });
    var copyBtn = document.createElement('button');
    copyBtn.textContent = 'copy';
    copyBtn.style.cssText = 'background:#1a3050;color:#7ab8f5;border:1px solid #2a4a70;' +
      'border-radius:3px;padding:2px 8px;font-size:11px;font-family:inherit;cursor:pointer;' +
      'white-space:nowrap;flex-shrink:0;margin-left:4px';
    copyBtn.addEventListener('click', function () {
      var url = urlLinkEl ? urlLinkEl.href : buildCleanUrl({});
      navigator.clipboard.writeText(url).then(function () {
        copyBtn.textContent = 'copied!';
        copyBtn.style.color = '#6dca80';
        setTimeout(function () { copyBtn.textContent = 'copy'; copyBtn.style.color = '#7ab8f5'; }, 1500);
      }).catch(function () {
        copyBtn.textContent = 'failed';
        setTimeout(function () { copyBtn.textContent = 'copy'; }, 1500);
      });
    });
    updateUrlDisplay();
    urlBox.appendChild(urlLabel);
    urlBox.appendChild(urlLinkEl);
    urlBox.appendChild(copyBtn);
    panel.appendChild(urlBox);

    document.body.appendChild(panel);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }
})();
</script>

<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
</body>
</html>
